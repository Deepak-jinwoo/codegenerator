    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        .light-leak-cyan {
            background: radial-gradient(circle at top left, rgba(0, 245, 255, 0.08) 0%, transparent 50%);
        }
        .light-leak-violet {
            background: radial-gradient(circle at bottom right, rgba(87, 27, 193, 0.1) 0%, transparent 50%);
        }
        .text-glow-primary {
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
        }
        .text-glow-secondary {
            text-shadow: 0 0 20px rgba(196, 171, 255, 0.3);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #3a494a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #849495; }

        /* Code block styling */
        pre code {
            font-family: 'Space Grotesk', 'Fira Code', monospace;
            font-size: 13px;
        }
        /* Animated gradient border */
        @keyframes border-glow {
            0%, 100% { border-color: rgba(0, 245, 255, 0.2); }
            50% { border-color: rgba(0, 245, 255, 0.5); }
        }
        .border-glow-anim {
            animation: border-glow 3s ease-in-out infinite;
        }
        /* Pulse dot */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 4px #00f5ff; }
            50% { box-shadow: 0 0 12px #00f5ff, 0 0 20px rgba(0,245,255,0.3); }
        }
        .pulse-dot {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        /* Typing animation */
        @keyframes typing-bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }
        .typing-dot { animation: typing-bounce 1.4s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden">

    <script type="text/babel" src="components/ChatInterface.js"></script>

</body>
</html>
